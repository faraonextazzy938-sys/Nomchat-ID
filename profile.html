<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomchat ID — Profile</title>
    <link rel="stylesheet" href="main.css">
    <style>
        .lang-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.82em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 8px;
        }
        .lang-btn:hover { background: rgba(255,255,255,0.25); }
    </style>
</head>
<body>

<header class="nc-header">
    <div class="nc-header-inner">
        <a href="index.html" class="nc-logo">
            <span class="nc-logo-icon">💬</span>
            <span class="nc-logo-name">NOMCHAT</span>
            <span class="nc-logo-badge">ID</span>
        </a>
        <nav class="nc-nav">
            <a href="index.html" class="nc-nav-link" data-i18n="nav.home">Home</a>
            <a href="games.html" class="nc-nav-link" data-i18n="nav.apps">Apps</a>
            <a href="connect.html" class="nc-nav-link" data-i18n="nav.connect">Connect</a>
            <a href="profile.html" class="nc-nav-link active" data-i18n="nav.profile">Profile</a>
        </nav>
        <div id="header-user-area">
            <button class="nc-header-logout" onclick="logout()" data-i18n="nav.signout">Sign out</button>
        </div>
        <button class="lang-btn" id="langToggleBtn" onclick="toggleLang()">🇷🇺 RU</button>
    </div>
</header>

<div class="nc-profile-hero">
    <div class="nc-profile-av-ring" id="profile-av">💬</div>
    <div class="nc-profile-name-row">
        <span class="nc-profile-badge">ID</span>
        <span class="nc-profile-username" id="profile-username">Player</span>
        <span id="adm-badge" style="display:none;background:#ef4444;color:#fff;font-size:0.55em;font-weight:900;padding:3px 8px;border-radius:6px;letter-spacing:1px;box-shadow:0 2px 10px rgba(239,68,68,0.5);">ADM</span>
        <span id="dev-badge" style="display:none;background:linear-gradient(135deg,#10b981,#06b6d4);color:#fff;font-size:0.55em;font-weight:900;padding:3px 8px;border-radius:6px;letter-spacing:1px;box-shadow:0 2px 10px rgba(16,185,129,0.5);">DEV</span>
        <button class="nc-btn-edit" onclick="editUsername()">✏️</button>
    </div>
    <p class="nc-profile-email" id="profile-email">—</p>
    <!-- Admin badge — shown only for admins -->
    <div id="admin-panel-btn" style="display:none;margin-top:16px">
        <a href="admin.html" style="
            display:inline-flex;align-items:center;gap:8px;
            padding:10px 24px;border-radius:99px;
            background:linear-gradient(135deg,#f59e0b,#ef4444);
            color:#fff;font-weight:800;font-size:0.9em;
            text-decoration:none;
            box-shadow:0 4px 20px rgba(245,158,11,0.4);
            transition:all 0.2s;
        " onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 28px rgba(245,158,11,0.55)'"
           onmouseout="this.style.transform='';this.style.boxShadow='0 4px 20px rgba(245,158,11,0.4)'">
            🛡️ Admin Panel
        </a>
    </div>
</div>

<div class="nc-profile-body">
    <div class="nc-profile-inner">

        <div class="nc-card">
            <div class="nc-card-title" data-i18n="profile.avatar">Change avatar</div>
            <div class="nc-av-grid" id="av-grid"></div>
            <button class="nc-btn-save" id="btn-save-av" onclick="saveAvatar()" disabled data-i18n="profile.save">Save avatar</button>
        </div>

        <div class="nc-card">
            <div class="nc-card-title" data-i18n="profile.connected">Connected apps</div>
            <div class="nc-connected-game">
                <div class="nc-cg-icon" style="background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div>
                    <div class="nc-cg-name">AI Chat Pro</div>
                    <div class="nc-cg-status">● Connected</div>
                </div>
                <a href="http://localhost:3000" target="_blank" class="nc-cg-open">Open</a>
            </div>
        </div>

        <div class="nc-card">
            <div class="nc-card-title" data-i18n="profile.account">Account info</div>
            <div class="nc-info-row"><span class="nc-info-label" data-i18n="profile.email">Email</span><span class="nc-info-value" id="acc-email">—</span></div>
            <div class="nc-info-row"><span class="nc-info-label" data-i18n="profile.since">Member since</span><span class="nc-info-value" id="acc-since">—</span></div>
            <div class="nc-info-row"><span class="nc-info-label" data-i18n="profile.login">Last sign in</span><span class="nc-info-value" id="acc-login">—</span></div>
            <button class="nc-btn-save" onclick="logout()" style="margin-top:20px" data-i18n="nav.signout">Sign out</button>
            <button class="nc-btn-danger" onclick="deleteAccount()" data-i18n="profile.delete">Delete account</button>
        </div>

    </div>
</div>

<footer class="nc-footer">
    <div class="nc-footer-inner">
        <div>
            <a href="index.html" class="nc-footer-logo">
                <span class="nc-logo-icon">💬</span>
                <span class="nc-logo-name">NOMCHAT</span>
                <span class="nc-logo-badge">ID</span>
            </a>
        </div>
        <div class="nc-footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
    </div>
    <div class="nc-footer-bottom">© 2026 Nomchat ID. All rights reserved.</div>
</footer>

<script src="i18n.js"></script>
<script src="app.js"></script>
<script src="profile.js"></script>
<script src="cookies.js"></script></body>
</html>

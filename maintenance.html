<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance — Nomchat ID</title>
    <style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
    background:#0a0a0f; color:#f0f0ff; min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:24px;
    overflow:hidden;
}
body::before {
    content:''; position:fixed; inset:0;
    background:radial-gradient(ellipse 700px 500px at 50% 40%, rgba(245,158,11,0.07) 0%, transparent 70%);
    pointer-events:none;
}
.card {
    max-width:560px; width:100%;
    background:rgba(15,15,26,0.95);
    border:1px solid rgba(245,158,11,0.2);
    border-radius:24px; padding:52px 40px;
    text-align:center; position:relative; z-index:1;
    box-shadow:0 0 0 1px rgba(245,158,11,0.08), 0 32px 80px rgba(0,0,0,0.7), 0 0 60px rgba(245,158,11,0.05);
    animation:appear 0.5s ease;
}
@keyframes appear { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

.icon { font-size:4em; margin-bottom:20px; display:block; animation:spin 4s linear infinite; }
@keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

.badge {
    display:inline-block; padding:5px 14px; border-radius:99px;
    background:rgba(245,158,11,0.15); border:1px solid rgba(245,158,11,0.3);
    color:#f59e0b; font-size:0.75em; font-weight:800;
    letter-spacing:2px; text-transform:uppercase; margin-bottom:20px;
}
h1 { font-size:1.8em; font-weight:900; margin-bottom:10px; }
.sub { color:rgba(240,240,255,0.5); font-size:0.95em; line-height:1.7; margin-bottom:36px; }

.progress-wrap { background:rgba(255,255,255,0.06); border-radius:99px; height:6px; margin-bottom:36px; overflow:hidden; }
.progress-bar {
    height:100%; border-radius:99px;
    background:linear-gradient(90deg,#f59e0b,#ef4444,#f59e0b);
    background-size:200% 100%;
    animation:progress 2s linear infinite;
    width:60%;
}
@keyframes progress { 0%{background-position:0% 0%} 100%{background-position:200% 0%} }

.logo { display:inline-flex; align-items:center; gap:8px; text-decoration:none; opacity:0.4; transition:opacity 0.2s; }
.logo:hover { opacity:0.7; }
.logo-icon { font-size:1.2em; }
.logo-name { font-weight:900; font-size:0.9em; color:#f0f0ff; letter-spacing:1px; }
.logo-badge { background:#f59e0b; color:#000; font-size:0.55em; font-weight:900; padding:2px 6px; border-radius:4px; }
    </style>
</head>
<body>
<div class="card">
    <span class="icon">⚙️</span>
    <div class="badge">Maintenance</div>
    <h1>We'll be right back</h1>
    <p class="sub">Nomchat ID is currently undergoing scheduled maintenance. We're working hard to improve your experience. Please check back soon.</p>
    <div class="progress-wrap"><div class="progress-bar"></div></div>
    <a href="/" class="logo">
        <span class="logo-icon">💬</span>
        <span class="logo-name">NOMCHAT</span>
        <span class="logo-badge">ID</span>
    </a>
</div>
</body>
</html>

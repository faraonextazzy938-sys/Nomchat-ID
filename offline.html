<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>35092 — Server Disabled</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace, Arial, sans-serif;
            background: #0a0a0f;
            color: #f0f0ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        /* Scanlines effect */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            pointer-events: none; z-index: 10;
        }

        /* Red glow bg */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background: radial-gradient(ellipse 600px 400px at 50% 40%, rgba(239,68,68,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .card {
            max-width: 560px; width: 100%;
            background: rgba(15,15,26,0.95);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 20px;
            padding: 48px 40px;
            text-align: center;
            position: relative; z-index: 1;
            box-shadow: 0 0 0 1px rgba(239,68,68,0.1), 0 32px 80px rgba(0,0,0,0.7), 0 0 60px rgba(239,68,68,0.06);
            animation: appear 0.5s ease;
        }
        @keyframes appear {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .error-icon {
            font-size: 3.5em;
            margin-bottom: 20px;
            display: block;
            animation: pulse 2s ease-in-out infinite;
            filter: drop-shadow(0 0 16px rgba(239,68,68,0.6));
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.05); }
        }

        .error-code {
            font-size: 0.72em;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #ef4444;
            margin-bottom: 12px;
            font-family: 'Courier New', monospace;
        }

        h1 {
            font-size: 1.6em;
            font-weight: 900;
            margin-bottom: 8px;
            color: #f0f0ff;
        }

        .sub {
            font-size: 0.9em;
            color: rgba(240,240,255,0.5);
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .terminal {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 12px;
            padding: 20px 24px;
            text-align: left;
            font-family: 'Courier New', monospace;
            font-size: 0.82em;
            line-height: 1.8;
            margin-bottom: 32px;
        }
        .t-line { display: flex; gap: 10px; }
        .t-prompt { color: #ef4444; flex-shrink: 0; }
        .t-text { color: rgba(240,240,255,0.7); }
        .t-val { color: #f59e0b; }
        .t-err { color: #ef4444; }
        .t-ok  { color: #10b981; }

        .logo {
            display: inline-flex; align-items: center; gap: 8px;
            text-decoration: none;
            opacity: 0.4;
            transition: opacity 0.2s;
            margin-top: 8px;
        }
        .logo:hover { opacity: 0.7; }
        .logo-icon { font-size: 1.2em; }
        .logo-name { font-weight: 900; font-size: 0.9em; color: #f0f0ff; letter-spacing: 1px; }
        .logo-badge { background: #ef4444; color: #fff; font-size: 0.55em; font-weight: 900; padding: 2px 6px; border-radius: 4px; }

        /* Blinking cursor */
        .cursor {
            display: inline-block; width: 8px; height: 14px;
            background: #ef4444; vertical-align: middle;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    </style>
</head>
<body>
<div class="card">
    <span class="error-icon">🔴</span>
    <div class="error-code">ERROR 35092 · GTT-48293</div>
    <h1>Server Disabled</h1>
    <p class="sub">This server has been temporarily shut down by the developer. Please try again later.</p>

    <div class="terminal">
        <div class="t-line"><span class="t-prompt">$</span><span class="t-text">nomchat status</span></div>
        <div class="t-line"><span class="t-prompt">›</span><span class="t-text">state: <span class="t-err">OFFLINE</span></span></div>
        <div class="t-line"><span class="t-prompt">›</span><span class="t-text">code: <span class="t-val">35092</span></span></div>
        <div class="t-line"><span class="t-prompt">›</span><span class="t-text">register: <span class="t-err">FOUND — DISABLED</span></span></div>
        <div class="t-line"><span class="t-prompt">›</span><span class="t-text">error: <span class="t-val">48293 GTT</span></span></div>
        <div class="t-line"><span class="t-prompt">›</span><span class="t-text">reason: <span class="t-err">этот сервер отключен</span></span></div>
        <div class="t-line" style="margin-top:8px"><span class="t-prompt">$</span><span class="t-text"><span class="cursor"></span></span></div>
    </div>

    <a href="/" class="logo">
        <span class="logo-icon">💬</span>
        <span class="logo-name">NOMCHAT</span>
        <span class="logo-badge">ID</span>
    </a>
</div>
</body>
</html>

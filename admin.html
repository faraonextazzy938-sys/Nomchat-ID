<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomchat ID — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--accent:#1565c0;--bg:#0a0e1a;--bg2:#0f1525;--border:rgba(255,255,255,0.07);--text2:rgba(255,255,255,0.6);--text3:rgba(255,255,255,0.3)}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:#fff;min-height:100vh}
        .sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;z-index:100}
        .sb-logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px}
        .sb-logo-row{display:flex;align-items:center;gap:7px}
        .sb-logo-emoji{font-size:1.3em}
        .sb-logo-text{color:#fff;font-weight:900;font-size:1.05em}
        .sb-logo-badge{background:var(--accent);color:#fff;font-size:0.6em;font-weight:900;padding:2px 6px;border-radius:4px}
        .sb-sub{color:var(--text3);font-size:0.75em;margin-top:4px}
        .nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:var(--text2);cursor:pointer;transition:all 0.2s;font-size:0.92em;border-left:3px solid transparent}
        .nav-item:hover{background:rgba(255,255,255,0.05);color:#fff}
        .nav-item.active{background:rgba(21,101,192,0.15);color:#fff;border-left-color:var(--accent)}
        .nav-icon{font-size:1.1em;width:20px;text-align:center}
        .sb-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border)}
        .sb-user{color:var(--text3);font-size:0.8em;margin-bottom:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .btn-logout{width:100%;padding:8px;background:rgba(255,255,255,0.06);color:var(--text2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:0.85em;font-family:inherit;transition:all 0.2s}
        .btn-logout:hover{background:rgba(255,255,255,0.1);color:#fff}
        .main{margin-left:220px;padding:32px;min-height:100vh}
        .page{display:none}
        .page.active{display:block;animation:fadeIn 0.3s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .page-title{font-size:1.5em;font-weight:800;margin-bottom:24px}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:32px}
        .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px}
        .stat-label{font-size:0.82em;color:var(--text3);margin-bottom:6px}
        .stat-value{font-size:2.2em;font-weight:900;color:var(--accent)}
        .table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
        .table-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .table-head h3{font-size:0.95em;font-weight:700}
        table{width:100%;border-collapse:collapse}
        th{padding:11px 16px;text-align:left;font-size:0.78em;color:var(--text3);font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--border)}
        td{padding:12px 16px;font-size:0.88em;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:rgba(255,255,255,0.02)}
        .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:0.75em;font-weight:700}
        .badge-admin{background:rgba(21,101,192,0.2);color:#42a5f5}
        .badge-user{background:rgba(255,255,255,0.06);color:var(--text3)}
        .btn{padding:7px 14px;border:none;border-radius:8px;font-size:0.82em;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s}
        .btn-primary{background:var(--accent);color:#fff}
        .btn-primary:hover{background:#1976d2}
        .btn-danger{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
        .btn-danger:hover{background:rgba(239,68,68,0.25)}
        .actions{display:flex;gap:6px}
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sb-logo">
        <div class="sb-logo-row">
            <span class="sb-logo-emoji">💬</span>
            <span class="sb-logo-text">Nomchat</span>
            <span class="sb-logo-badge">ID</span>
        </div>
        <div class="sb-sub">Admin Panel</div>
    </div>
    <nav>
        <div class="nav-item active" onclick="showPage('dashboard',this)"><span class="nav-icon">📊</span>Dashboard</div>
        <div class="nav-item" onclick="showPage('users',this)"><span class="nav-icon">👥</span>Users</div>
    </nav>
    <div class="sb-footer">
        <div class="sb-user" id="admin-email">—</div>
        <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
</aside>

<main class="main">
    <div class="page active" id="page-dashboard">
        <div class="page-title">Dashboard</div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Total users</div><div class="stat-value" id="stat-users">—</div></div>
            <div class="stat-card"><div class="stat-label">Admins</div><div class="stat-value" id="stat-admins">—</div></div>
        </div>
    </div>

    <div class="page" id="page-users">
        <div class="page-title">Users</div>
        <div class="table-wrap">
            <div class="table-head"><h3>All users</h3></div>
            <table>
                <thead><tr><th>ID</th><th>Email</th><th>Username</th><th>Role</th><th>Joined</th><th>Last login</th><th>Actions</th></tr></thead>
                <tbody id="users-tbody"></tbody>
            </table>
        </div>
    </div>
</main>

<script>
const API = '';

async function init() {
    const res = await fetch(`${API}/api/auth/me`, { credentials:'include' });
    if (!res.ok) { window.location.href = 'login.html'; return; }
    const user = await res.json();
    if (!user.is_admin) { window.location.href = 'index.html'; return; }
    document.getElementById('admin-email').textContent = user.email;
    loadDashboard();
}

async function logout() {
    await fetch(`${API}/api/auth/logout`, { method:'POST', credentials:'include' });
    window.location.href = 'login.html';
}

function showPage(name, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    el.classList.add('active');
    if (name === 'dashboard') loadDashboard();
    if (name === 'users') loadUsers();
}

async function loadDashboard() {
    const res  = await fetch(`${API}/api/admin/stats`, { credentials:'include' });
    const data = await res.json();
    document.getElementById('stat-users').textContent  = data.users;
    document.getElementById('stat-admins').textContent = data.admins;
}

async function loadUsers() {
    const res   = await fetch(`${API}/api/admin/users`, { credentials:'include' });
    const users = await res.json();
    document.getElementById('users-tbody').innerHTML = users.map(u => `
        <tr>
            <td>${u.id}</td>
            <td>${u.email}</td>
            <td>${u.username}</td>
            <td><span class="badge badge-${u.is_admin ? 'admin' : 'user'}">${u.is_admin ? 'Admin' : 'User'}</span></td>
            <td>${fmt(u.created_at)}</td>
            <td>${fmt(u.last_login)}</td>
            <td><div class="actions">
                <button class="btn btn-primary" onclick="toggleAdmin(${u.id})">${u.is_admin ? 'Remove admin' : 'Make admin'}</button>
                <button class="btn btn-danger" onclick="deleteUser(${u.id})">Delete</button>
            </div></td>
        </tr>`).join('');
}

async function toggleAdmin(id) {
    await fetch(`${API}/api/admin/users/${id}/toggle-admin`, { method:'POST', credentials:'include' });
    loadUsers();
}

async function deleteUser(id) {
    if (!confirm('Delete this user?')) return;
    await fetch(`${API}/api/admin/users/${id}`, { method:'DELETE', credentials:'include' });
    loadUsers();
}

function fmt(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-US', { day:'2-digit', month:'short', year:'numeric' });
}

init();
</script>
</body>
</html>
